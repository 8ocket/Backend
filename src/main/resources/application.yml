spring:
  application:
    name: mindLog
  profiles:
    active: ${PROFILE}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  servlet:
    multipart:
      max-file-size: 5242880 #5MB
      max-request-size: 10485760 #10MB

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret-key: ${KT_JWT_SECRET}
  access-token-exp: 1800000 #30분
  refresh-token-exp: 43200000 #12시간

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_PROD_REDIRECT_URI}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_PROD_REDIRECT_URI}

stream:
  baseurl: ${SESSION_BASE_URL}
  message-uri: ${SESSION_MESSAGE_URI}
  finalize-uri: ${SESSION_FINALIZE_URI}
  report-uri: ${REPORT_URI}

cors:
  local: ${CORS_LOCAL_URL}
  dev: ${CORS_DEV_URL}
  prod: ${CORS_PROD_URL}

server:
  port: 8080

cloud:
  aws:
    region: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET_NAME}

default:
  image:
    profile: ${DEFAULT_PROFILE_IMAGE}
    persona: ${DEFAULT_PERSONA_IMAGE}