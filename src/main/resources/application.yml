spring:
  application:
    name: mindLog
  profiles:
    active: ${PROFILE}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret-key: ${KT_JWT_SECRET}
  access-token-exp: 300000
  refresh-token-exp: 43200000